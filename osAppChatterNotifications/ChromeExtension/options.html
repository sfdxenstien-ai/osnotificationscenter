<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatter Notifications Settings</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            padding: 40px;
            background: #f4f6f9;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            padding: 32px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin: 0 0 8px 0;
            font-size: 24px;
            color: #181818;
        }

        .subtitle {
            margin: 0 0 32px 0;
            color: #706e6b;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #3e3e3c;
        }

        input[type="text"],
        input[type="url"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #c9c7c5;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="url"]:focus {
            outline: none;
            border-color: #0176d3;
            box-shadow: 0 0 0 3px rgba(1, 118, 211, 0.1);
        }

        .helper-text {
            margin-top: 6px;
            font-size: 12px;
            color: #706e6b;
        }

        .btn-primary {
            background: #0176d3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background: #014486;
        }

        .btn-primary:disabled {
            background: #c9c7c5;
            cursor: not-allowed;
        }

        .success-message {
            margin-top: 16px;
            padding: 12px;
            background: #e8f5e9;
            color: #2e7d32;
            border-radius: 4px;
            font-size: 13px;
            display: none;
        }

        .success-message.show {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section {
            margin-bottom: 32px;
            padding-bottom: 32px;
            border-bottom: 1px solid #e5e5e5;
        }

        .section:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin: 0 0 16px 0;
            color: #181818;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-label {
            font-size: 14px;
            color: #3e3e3c;
            cursor: pointer;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Settings</h1>
        <p class="subtitle">Configure your Chatter Notifications extension</p>

        <div class="section">
            <h2 class="section-title">User Configuration</h2>
            <div class="form-group">
                <label for="userId">User ID</label>
                <input type="text" id="userId" placeholder="Enter your Salesforce User ID">
                <div class="helper-text">Your unique user identifier for receiving notifications</div>
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">Server Configuration</h2>
            <div class="form-group">
                <label for="serverUrl">WebSocket Server URL</label>
                <input type="url" id="serverUrl" placeholder="https://osnotificationscenter.onrender.com" value="https://osnotificationscenter.onrender.com">
                <div class="helper-text">Default: https://osnotificationscenter.onrender.com</div>
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">Notification Preferences</h2>
            <div class="checkbox-group">
                <input type="checkbox" id="enableDesktopNotifications" checked>
                <label for="enableDesktopNotifications" class="checkbox-label">Enable desktop notifications</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="enableSounds" checked>
                <label for="enableSounds" class="checkbox-label">Enable notification sounds</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="autoConnect" checked>
                <label for="autoConnect" class="checkbox-label">Auto-connect on startup</label>
            </div>
        </div>

        <button id="saveBtn" class="btn-primary">Save Settings</button>
        <div id="successMessage" class="success-message">Settings saved successfully!</div>
    </div>

    <script src="options.js"></script>
</body>
</html>
